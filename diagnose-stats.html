<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnóstico de Estatísticas - Quest4Couple</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #667eea; margin-bottom: 20px; }
    .status { 
      padding: 15px; 
      border-radius: 10px; 
      margin: 15px 0;
      background: #f8f9fa;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .warning { background: #fff3cd; color: #856404; }
    button {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      margin: 10px 5px;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log {
      background: #1e1e1e;
      color: #00ff00;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 0.85em;
      max-height: 500px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-top: 20px;
    }
    .summary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      display: none;
    }
    .summary h2 { margin: 0 0 15px 0; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    .summary-item {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .summary-item .value {
      font-size: 2em;
      font-weight: 700;
    }
    .summary-item .label {
      font-size: 0.9em;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Diagnóstico de Estatísticas</h1>
    <p>Esta ferramenta analisa o Firestore para diagnosticar porque há ~22k respostas em vez de ~33k.</p>
    
    <div id="authStatus" class="status info">
      🔄 A verificar autenticação...
    </div>
    
    <div id="buttons" style="display: none;">
      <button onclick="runDiagnosis()" id="btnDiagnose">
        🔍 Executar Diagnóstico Completo
      </button>
    </div>
    
    <div class="summary" id="summary">
      <h2>📊 Resumo do Diagnóstico</h2>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="value" id="totalUsers">-</div>
          <div class="label">Utilizadores</div>
        </div>
        <div class="summary-item">
          <div class="value" id="usersWithAnswers">-</div>
          <div class="label">Com Respostas</div>
        </div>
        <div class="summary-item">
          <div class="value" id="totalResponses">-</div>
          <div class="label">Respostas Totais</div>
        </div>
        <div class="summary-item">
          <div class="value" id="avgPerUser">-</div>
          <div class="label">Média/Utilizador</div>
        </div>
      </div>
    </div>
    
    <div id="log"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script src="js/firebase-config.js"></script>
  
  <script>
    const logEl = document.getElementById('log');
    const authStatusEl = document.getElementById('authStatus');
    const buttonsEl = document.getElementById('buttons');
    
    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString('pt-PT');
      const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : '📊';
      logEl.textContent += `[${time}] ${prefix} ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }
      // Verificar autenticação
    firebase.auth().onAuthStateChanged(async (user) => {
      if (user) {
        log(`Utilizador autenticado: ${user.email}`, 'success');
        
        // Verificar se é admin OU se é o email do admin principal
        const db = firebase.firestore();
        const adminEmails = ['admin@quest4couple.pt', 'quest4couple@gmail.com'];
        const isAdminByEmail = adminEmails.includes(user.email.toLowerCase());
        
        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          const isAdminByFlag = userDoc.exists && userDoc.data().isAdmin;
          
          if (isAdminByFlag || isAdminByEmail) {
            authStatusEl.className = 'status success';
            authStatusEl.innerHTML = `✅ Autenticado: ${user.email}`;
            buttonsEl.style.display = 'block';
            log('Permissões confirmadas', 'success');
            
            // Se não tem flag de admin mas deveria ter, sugerir corrigir
            if (isAdminByEmail && !isAdminByFlag) {
              log('NOTA: O teu user não tem isAdmin=true no Firestore. Considera adicionar.', 'warning');
            }
          } else {
            authStatusEl.className = 'status error';
            authStatusEl.innerHTML = '❌ Utilizador não é admin';
            log('Este utilizador não tem permissões de admin', 'error');
          }
        } catch (e) {
          // Se falhou a verificar, mas é email admin, permite na mesma
          if (isAdminByEmail) {
            authStatusEl.className = 'status success';
            authStatusEl.innerHTML = `✅ Autenticado: ${user.email}`;
            buttonsEl.style.display = 'block';
            log('Permissões confirmadas por email', 'success');
          } else {
            authStatusEl.className = 'status error';
            authStatusEl.innerHTML = `❌ Erro: ${e.message}`;
            log(`Erro ao verificar admin: ${e.message}`, 'error');
          }
        }
      } else {
        authStatusEl.className = 'status error';
        authStatusEl.innerHTML = '❌ Não autenticado. <a href="pages/admin.html">Fazer login primeiro</a>';
        log('Não há utilizador autenticado', 'error');
      }
    });
    
    async function runDiagnosis() {
      const btn = document.getElementById('btnDiagnose');
      btn.disabled = true;
      btn.textContent = '⏳ A analisar...';
      
      logEl.textContent = '';
      
      try {
        const db = firebase.firestore();
        
        // ===== 1. Verificar publicStatistics atual =====
        log('========================================');
        log('1. VERIFICAR CACHE PÚBLICO ATUAL');
        log('========================================');
          const cacheDoc = await db.collection('publicStatistics').doc('questionAnalytics').get();
        if (cacheDoc.exists) {
          const data = cacheDoc.data();
          const lastUpdate = data.lastUpdate?.toDate();
          log(`Total de respostas no cache: ${data.totalResponses?.toLocaleString('pt-PT') || 'N/A'}`);
          log(`Total de questões: ${data.totalQuestions || 'N/A'}`);
          log(`Última atualização: ${lastUpdate?.toLocaleString('pt-PT') || 'N/A'}`);
          log(`Versão: ${data.version || 'N/A'}`);
          
          // Analisar o conteúdo do cache em detalhe
          if (data.questions && data.questions.length > 0) {
            log(`\n--- ANÁLISE DETALHADA DO CACHE ---`);
            
            // Contar respostas por pack no cache
            const cachePackStats = {};
            let verifiedTotal = 0;
            
            data.questions.forEach(q => {
              const pack = q.packId || 'unknown';
              if (!cachePackStats[pack]) {
                cachePackStats[pack] = { questions: 0, responses: 0 };
              }
              cachePackStats[pack].questions++;
              cachePackStats[pack].responses += q.total || 0;
              verifiedTotal += q.total || 0;
            });
            
            Object.keys(cachePackStats).sort().forEach(pack => {
              const stats = cachePackStats[pack];
              log(`${pack}: ${stats.questions} questões, ${stats.responses.toLocaleString('pt-PT')} respostas`);
            });
            
            log(`\nTotal verificado: ${verifiedTotal.toLocaleString('pt-PT')} respostas`);
            
            // Estatísticas médias
            const avgPerQuestion = data.questions.length > 0 
              ? Math.round(verifiedTotal / data.questions.length) 
              : 0;
            log(`Média por questão: ${avgPerQuestion} respostas`);
            
            // Estimar número de utilizadores (assumindo ~100 respostas/user)
            const estimatedUsers = Math.round(verifiedTotal / 100);
            log(`Utilizadores estimados (média ~100 respostas): ~${estimatedUsers}`);
          }
        } else {
          log('Cache público não existe!', 'warning');
        }
        
        // ===== 2. Contar utilizadores =====
        log('\n========================================');
        log('2. ANALISAR UTILIZADORES');
        log('========================================');
        
        const usersSnapshot = await db.collection('users').get();
        const totalUsers = usersSnapshot.size;
        log(`Total de utilizadores na collection: ${totalUsers}`);
        
        // Limites de perguntas por pack
        const packLimits = {
          'romantico': 50,
          'experiencia': 50,
          'pimentinha': 50,
          'poliamor': 60,
          'kinks': 90
        };
        
        // ===== 3. Analisar respostas =====
        log('\n========================================');
        log('3. ANALISAR RESPOSTAS');
        log('========================================');
        
        let usersWithAnswers = 0;
        let totalResponses = 0;
        let responsesPerPack = {};
        let customQuestionsCount = 0;
        let usersPerPack = {};
        let processedCount = 0;
          let permissionErrors = 0;
        let noAnswersDoc = 0;
        let emptyAnswersDoc = 0;
        
        for (const userDoc of usersSnapshot.docs) {
          processedCount++;
          
          if (processedCount % 50 === 0) {
            log(`Processando utilizador ${processedCount}/${totalUsers}...`);
          }
          
          try {
            const answersDoc = await db.collection('users').doc(userDoc.id).collection('answers').doc('all').get();
            
            if (!answersDoc.exists) {
              noAnswersDoc++;
              continue;
            }
            
            const answersData = answersDoc.data() || {};
            
            if (Object.keys(answersData).length === 0) {
              emptyAnswersDoc++;
              continue;
            }
            
            usersWithAnswers++;
            
            // Contar respostas por pack
            Object.keys(answersData).forEach(packKey => {
              const packAnswers = answersData[packKey] || {};
              const maxQuestions = packLimits[packKey] || 50;
              
              if (!responsesPerPack[packKey]) responsesPerPack[packKey] = 0;
              if (!usersPerPack[packKey]) usersPerPack[packKey] = 0;
              
              let packResponseCount = 0;
              
              Object.keys(packAnswers).forEach(qKey => {
                const answerData = packAnswers[qKey];
                if (!answerData || !answerData.answer) return;
                
                const questionIndex = parseInt(qKey.replace('q', '')) - 1;
                
                // Verificar se é pergunta personalizada
                if (questionIndex >= maxQuestions) {
                  customQuestionsCount++;
                  return; // Não conta para estatísticas oficiais
                }
                
                // Verificar se é resposta válida
                if (!['porfavor', 'yup', 'talvez', 'meh'].includes(answerData.answer)) {
                  return;
                }
                
                totalResponses++;
                responsesPerPack[packKey]++;
                packResponseCount++;
              });
              
              if (packResponseCount > 0) {
                usersPerPack[packKey]++;
              }
            });
              } catch (e) {
            // Registar erros de permissão
            permissionErrors++;
            if (permissionErrors <= 3) {
              log(`Erro ao ler respostas do user ${userDoc.id.substring(0,8)}...: ${e.message}`, 'error');
            }
          }
        }
        
        log(`\nUtilizadores com respostas: ${usersWithAnswers}`);
        log(`Sem documento 'answers/all': ${noAnswersDoc}`);
        log(`Documento vazio: ${emptyAnswersDoc}`);
        log(`Erros de permissão: ${permissionErrors}`);
        log(`Respostas personalizadas ignoradas: ${customQuestionsCount}`);
        log(`TOTAL DE RESPOSTAS OFICIAIS: ${totalResponses.toLocaleString('pt-PT')}`);
        
        if (permissionErrors > 0) {
          log(`\n⚠️ PROBLEMA IDENTIFICADO: Erros de permissão ao ler subcollections!`, 'warning');
          log(`As regras do Firestore podem estar a bloquear leitura de 'users/{uid}/answers'.`, 'warning');
          log(`Verifica as regras em firestore.rules.`, 'warning');
        }
        
        // ===== 4. Breakdown por pack =====
        log('\n========================================');
        log('4. RESPOSTAS POR PACK');
        log('========================================');
        
        Object.keys(responsesPerPack).sort().forEach(pack => {
          const responses = responsesPerPack[pack];
          const users = usersPerPack[pack];
          const avgPerUser = users > 0 ? (responses / users).toFixed(1) : 0;
          log(`${pack}: ${responses.toLocaleString('pt-PT')} respostas (${users} users, média ${avgPerUser}/user)`);
        });
        
        // ===== 5. Comparação =====
        log('\n========================================');
        log('5. COMPARAÇÃO COM CACHE PÚBLICO');
        log('========================================');
        
        const cachedTotal = cacheDoc.exists ? cacheDoc.data().totalResponses : 0;
        const difference = totalResponses - cachedTotal;
        
        log(`Cache público: ${cachedTotal.toLocaleString('pt-PT')}`);
        log(`Calculado agora: ${totalResponses.toLocaleString('pt-PT')}`);
        log(`Diferença: ${difference > 0 ? '+' : ''}${difference.toLocaleString('pt-PT')}`);
        
        if (Math.abs(difference) > 100) {
          log(`\n⚠️ DIFERENÇA SIGNIFICATIVA DETETADA!`, 'warning');
          log(`O cache público pode estar desatualizado.`, 'warning');
          log(`Considera publicar novamente as estatísticas.`, 'warning');
        } else {
          log(`\n✅ Cache público está atualizado!`, 'success');
        }
          // ===== 6. Análise de perda de dados =====
        log('\n========================================');
        log('6. ANÁLISE DO HISTÓRICO');
        log('========================================');
        
        const cachedResponses = cacheDoc.exists ? cacheDoc.data().totalResponses : 0;
        
        log(`📊 DADOS ATUAIS NO CACHE: ${cachedResponses.toLocaleString('pt-PT')} respostas`);
        log(`👥 Total de utilizadores registados: ${totalUsers}`);
        
        if (permissionErrors > 0) {
          log(`\n⚠️ Não foi possível verificar diretamente as respostas.`, 'warning');
          log(`As regras do Firestore bloqueiam acesso às subcollections.`, 'warning');
          log(`\nPARA RESOLVER:`);
          log(`1. Vai à Firebase Console → Firestore`);
          log(`2. Encontra o documento do teu user em 'users'`);
          log(`3. Adiciona o campo: isAdmin = true`);
          log(`4. Depois corre o diagnóstico novamente`);
        }
        
        // Calcular se os números fazem sentido
        const avgResponsesPerUser = cachedResponses / totalUsers;
        log(`\n📈 Média de respostas por utilizador: ${avgResponsesPerUser.toFixed(1)}`);
        
        if (avgResponsesPerUser > 50 && avgResponsesPerUser < 300) {
          log(`✅ Este valor parece razoável (300 questões no total).`, 'success');
        } else if (avgResponsesPerUser > 300) {
          log(`⚠️ Média muito alta - pode haver contagem duplicada.`, 'warning');
        } else {
          log(`⚠️ Média baixa - alguns users podem não ter respondido muito.`, 'warning');
        }
        
        // ===== Atualizar resumo visual =====
        document.getElementById('summary').style.display = 'block';
        document.getElementById('totalUsers').textContent = totalUsers;
        document.getElementById('usersWithAnswers').textContent = usersWithAnswers;
        document.getElementById('totalResponses').textContent = totalResponses.toLocaleString('pt-PT');
        document.getElementById('avgPerUser').textContent = usersWithAnswers > 0 
          ? (totalResponses / usersWithAnswers).toFixed(1) 
          : '-';
        
        log('\n========================================');
        log('DIAGNÓSTICO COMPLETO!', 'success');
        log('========================================');
        
        btn.textContent = '✅ Diagnóstico Completo!';
        btn.style.background = '#28a745';
        
      } catch (error) {
        log(`ERRO: ${error.message}`, 'error');
        console.error(error);
        btn.disabled = false;
        btn.textContent = '🔍 Tentar Novamente';
      }
    }
  </script>
</body>
</html>
