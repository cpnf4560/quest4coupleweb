# Netlify Configuration - Quest4Couple
# ConfiguraÃ§Ã£o para deploy no quest4couple.pt

[build]
  # Pasta raiz para publicar
  publish = "."
  
  # Comando de build (nÃ£o necessÃ¡rio para site estÃ¡tico)
  command = ""

# SSL/TLS Configuration
[context.production]
  # ForÃ§ar HTTPS
  force_ssl = true

# Redirects e Rewrites
# Comentado - deixar o site carregar ficheiros HTML diretamente
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
#   force = false

# Headers de SeguranÃ§a
[[headers]]
  for = "/*"
  [headers.values]
    # SeguranÃ§a bÃ¡sica
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # PermissÃµes
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache para assets estÃ¡ticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para imagens
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PÃ¡ginas HTML - cache curto
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Redirect www para nÃ£o-www (ou vice-versa)
[[redirects]]
  from = "https://www.quest4couple.pt/*"
  to = "https://quest4couple.pt/:splat"
  status = 301
  force = true

# ForÃ§ar HTTPS - Redirect HTTP para HTTPS
[[redirects]]
  from = "http://quest4couple.pt/*"
  to = "https://quest4couple.pt/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.quest4couple.pt/*"
  to = "https://quest4couple.pt/:splat"
  status = 301
  force = true

# Custom 404
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404

# Funcionalidades do Netlify
[build.environment]
  NODE_VERSION = "18"

# Forms do Netlify (se necessÃ¡rio no futuro)
# [functions]
#   directory = "functions"

# Quest4You Cache Headers
[[headers]]
  for = "/quest4you/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/quest4you/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/quest4you/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/quest4you/data/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"